services:
  # Frontend: Static Site
  - type: web
    name: autopost-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Backend: Web Service
  - type: web
    name: autopost-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: autopost-db
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          type: static
          name: autopost-frontend
          property: host
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: JWT_SECRET
        generateValue: true

# Note: Render's free PostgreSQL expires after 90 days. 
# For a permanent free database, use Neon.tech and 
# replace the DATABASE_URL above with your Neon connection string.
