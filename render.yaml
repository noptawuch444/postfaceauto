services:
  # Frontend: Static Site
  - type: web
    name: autopost-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
    routes:
      - type: rewrite
        source: /api/*
        destination: https://postfaceauto-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

  # Backend: Web Service
  - type: web
    name: autopost-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
        placeholder: "postgresql://user:pass@host/dbname"
      - key: FRONTEND_URL
        value: https://goldsyncbotface.onrender.com
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: JWT_SECRET
        generateValue: true

# Note: Render's free PostgreSQL expires after 90 days. 
# For a permanent free database, use Neon.tech and 
# replace the DATABASE_URL above with your Neon connection string.
