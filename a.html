<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>Golden Snow Effect</title>
    <style>
        body {
            margin: 0;
            background: #050505;
            /* พื้นหลังเข้มขับสีทองให้เด่น */
            overflow: hidden;
            height: 100vh;
        }

        #snowCanvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <canvas id="snowCanvas"></canvas>

    <script>
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, flakes = [];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            flakes = [];
            // ปรับจำนวนเหลือเพียง 50 เม็ดเพื่อให้ดูน้อยและสบายตา
            for (let i = 0; i < 50; i++) {
                flakes.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    r: Math.random() * 2 + 1,
                    speed: Math.random() * 0.5 + 0.2 // ความเร็วต่ำมาก (ตกลงมาช้าๆ)
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            // ใช้สีทอง (Golden)
            ctx.fillStyle = "rgba(255, 215, 0, 0.7)";
            ctx.shadowBlur = 8; // เพิ่มความฟุ้งให้ดูเหมือนละอองทอง
            ctx.shadowColor = "gold";

            ctx.beginPath();
            for (let i = 0; i < flakes.length; i++) {
                let f = flakes[i];
                ctx.moveTo(f.x, f.y);
                ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
            }
            ctx.fill();

            for (let i = 0; i < flakes.length; i++) {
                flakes[i].y += flakes[i].speed;
                if (flakes[i].y > height) flakes[i].y = -10;
            }
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>

</html>
